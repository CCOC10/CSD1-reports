<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประกาศย้ายเว็บไซต์</title>
    <!-- โหลด Tailwind CSS สำหรับการตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- คำสั่ง Redirect อัตโนมัติใน 5 วินาที (เผื่อ JavaScript ไม่ทำงาน) -->
    <meta http-equiv="refresh" content="5;url=https://csd-1-reports.vercel.app" />
    <!-- โหลดฟอนต์ภาษาไทย Prompt -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        body {
            font-family: 'Prompt', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center p-4">

    <!-- การ์ดประกาศ -->
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-lg w-full text-center border border-gray-700">
        
        <!-- ไอคอนแจ้งเตือน (SVG) -->
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-yellow-900/30 mb-6">
            <svg class="h-10 w-10 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <!-- ข้อความหลัก -->
        <h1 class="text-2xl md:text-3xl font-semibold text-white mb-4">ขออภัยในความไม่สะดวก</h1>
        <p class="text-gray-300 mb-2 leading-relaxed">
            ขณะนี้เราได้ทำการย้ายหน้าเว็บไซต์ไปยังที่อยู่ใหม่แล้ว
        </p>
        
        <!-- ข้อความนับถอยหลัง -->
        <p class="text-gray-400 text-sm mb-8">
            ระบบจะนำคุณไปยังหน้าเว็บใหม่โดยอัตโนมัติในอีก <span id="countdown" class="font-bold text-blue-400 text-lg">5</span> วินาที...
        </p>

        <!-- ปุ่มกดไปเว็บใหม่ทันที -->
        <a href="https://csd-1-reports.vercel.app"
           class="inline-block w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-4 rounded-xl transition-all duration-300 shadow-sm hover:shadow-md">
            คลิกเพื่อไปยังเว็บไซต์ใหม่ทันที
        </a>

        <!-- แสดง URL ให้ผู้ใช้เห็นชัดเจน -->
        <div class="mt-8 p-4 bg-gray-900 rounded-xl break-all border border-gray-700">
            <p class="text-xs text-gray-500 mb-1">ลิงก์เว็บไซต์ใหม่ (URL):</p>
            <a href="https://csd-1-reports.vercel.app" class="text-sm text-blue-400 hover:text-blue-300 hover:underline">
                https://csd-1-reports.vercel.app
            </a>
        </div>
        
    </div>

    <!-- สคริปต์นับถอยหลัง -->
    <script>
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                // นำผู้ใช้ไปยังหน้าเว็บใหม่เมื่อครบเวลา
                window.location.href = "https://csd-1-reports.vercel.app";
            }
        }, 1000);
    </script>
</body>
</html>
