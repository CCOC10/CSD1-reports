function syncDocEditorScale() {
  const shell = document.getElementById('docEditorCanvasShell');
  const stage = document.getElementById('docEditorPreviewStage');
  const frame = getDocEditorPreviewFrame();
  const rulerShell = document.getElementById('docEditorRulerShell');
  const ruler = document.getElementById('docEditorRuler');
  if (!shell || !stage || !frame) return;
  const page = frame.querySelector('.official-print-page');
  if (!page) return;
  const fitScale = Math.min(1, (shell.clientWidth - 48) / page.offsetWidth);
  const scale = docEditorScaleMode === 'fit' ? fitScale : docEditorManualScale;
  if (ruler) ruler.style.width = `${page.offsetWidth}px`;
  frame.style.transform = `scale(${scale})`;
  if (rulerShell) rulerShell.style.transform = `scale(${scale})`;
  stage.style.width = `${Math.ceil(page.offsetWidth * scale)}px`;
  stage.style.height = `${Math.ceil(page.offsetHeight * scale + 24)}px`;
  const zoomLabel = document.getElementById('docEditorZoomLabel');
  if (zoomLabel) zoomLabel.textContent = `${Math.round(scale * 100)}%`;
  const zoomStatus = document.getElementById('docEditorZoomStatus');
  if (zoomStatus) zoomStatus.textContent = `${Math.round(scale * 100)}%`;
}

function setDocEditorScale(value) {
  if (value === 'fit') {
    docEditorScaleMode = 'fit';
  } else {
    docEditorScaleMode = 'manual';
    docEditorManualScale = Math.max(0.6, Math.min(1.2, Number(value) || 1));
  }
  syncDocEditorScale();
}

function adjustDocEditorScale(delta) {
  if (docEditorScaleMode === 'fit') {
    const shell = document.getElementById('docEditorCanvasShell');
    const frame = getDocEditorPreviewFrame();
    const page = frame ? frame.querySelector('.official-print-page') : null;
    const fitScale = shell && page ? Math.min(1, (shell.clientWidth - 48) / page.offsetWidth) : 1;
    docEditorManualScale = fitScale;
  }
  docEditorScaleMode = 'manual';
  docEditorManualScale = Math.max(0.6, Math.min(1.25, docEditorManualScale + delta));
  syncDocEditorScale();
}

function syncDocEditorChrome() {
  const win = document.getElementById('docEditorWindow');
  if (win) {
    win.classList.toggle('hide-ruler', !docEditorShowRuler);
    win.classList.toggle('show-guides', docEditorShowGuides);
  }
  const rulerState = document.getElementById('docEditorRulerState');
  if (rulerState) rulerState.textContent = docEditorShowRuler ? 'เปิด' : 'ปิด';
  const guideState = document.getElementById('docEditorGuideState');
  if (guideState) guideState.textContent = docEditorShowGuides ? 'เปิด' : 'ปิด';
  const rulerToggle = document.getElementById('docEditorRulerToggle');
  if (rulerToggle) rulerToggle.classList.toggle('active', docEditorShowRuler);
  const guideToggle = document.getElementById('docEditorGuideToggle');
  if (guideToggle) guideToggle.classList.toggle('active', docEditorShowGuides);
}

function toggleDocEditorRuler() {
  docEditorShowRuler = !docEditorShowRuler;

function toggleDocEditorGuides() {

  const active = document.activeElement;
  if (active && active.closest && active.closest('[data-doc-editable="true"]')) return active;
  const firstEditable = document.querySelector('#docEditorWrap [data-doc-editable="true"]');
  if (firstEditable) firstEditable.focus();
  return firstEditable;
}

function docEditorExec(command) {
  if (canUseImmediatePdfBackend()) {
    toast('โหมดนี้ใช้ตรวจสอบก่อนสร้าง PDF final แก้ไขข้อความไม่ได้','err');
    return;
  }
  const target = ensureDocEditorFocus();
  if (!target) return;
  let executed = false;
  if (command === 'linebreak') {
    executed = document.execCommand('insertLineBreak', false, null);
    if (!executed) document.execCommand('insertHTML', false, '<br>');
  } else if (command === 'paragraph') {
    document.execCommand('insertParagraph', false, null);
  } else {
    document.execCommand(command, false, null);
  }
  target.focus();
  const modeStatus = document.getElementById('docEditorModeStatus');
  if (modeStatus) modeStatus.textContent = `แก้ไขล่าสุด: ${command}`;
  updateDocEditorStatus('ปรับข้อความแล้ว สามารถบันทึก PDF ได้ทันที');
}

function getEditorPrintHtml() {
  const frame = getDocEditorPreviewFrame();

  const clone = frame.cloneNode(true);
  clone.removeAttribute('id');
  clone.querySelectorAll('[contenteditable],[data-doc-editable],[tabindex]').forEach((el) => {
    el.removeAttribute('contenteditable');
    el.removeAttribute('data-doc-editable');
    el.removeAttribute('tabindex');
  });
  applyPrintPhraseLayout(clone);
  return clone.innerHTML;
}

    generatedDocxUrl: isEphemeralUrl(S.generatedDocxUrl) ? '' : S.generatedDocxUrl,
    generatedWarnings: Array.isArray(S.generatedWarnings) ? S.generatedWarnings : [],
    generatedMode: S.generatedMode,
  };
}

async function submitConnectRequest(pdfBase64) {
  const payload = buildConnectRequestPayload();
  if (pdfBase64) {
    payload.files.pdfBase64    = pdfBase64;
    payload.files.pdfFileName  = `${getRequestFileBaseName()}.pdf`;
  }
  const data = await postConnectApi(buildAuthorizedApiPayload('submitConnectRequest', { payload }));
  if (String(data.status || '').toLowerCase() !== 'success') {
    const error = new Error(data.message || 'บันทึกคำขอ CSD1 Connect ไม่สำเร็จ');
    error.backendData = data;
    throw error;
  }
  return { data, payload };
}

function buildConnectSheetDiagnosticText(data) {
  if (!data || typeof data !== 'object') return '';
  const lines = [];
  const spreadsheetName = String(data.spreadsheetName || '').trim();
  const spreadsheetId = String(data.spreadsheetId || '').trim();
  const sheetName = String(data.sheetName || '').trim();
  const rowIndex = Number(data.rowIndex || 0);
  const apiUrl = String(getApiUrl() || '').trim();

  if (apiUrl) lines.push(`API URL: ${apiUrl}`);
  if (spreadsheetName) lines.push(`Spreadsheet: ${spreadsheetName}`);
  if (spreadsheetId) lines.push(`Spreadsheet ID: ${spreadsheetId}`);
  if (sheetName) lines.push(`Sheet: ${sheetName}`);
  if (rowIndex > 0) lines.push(`Row: ${rowIndex}`);

  return lines.length ? `\n\n${lines.join('\n')}` : '';
}

async function ensureConnectBackendReady() {
  let data = null;
  try {
    data = await postConnectApi(buildAuthorizedApiPayload('getConnectBackendInfo'));
  } catch (error) {
    throw new Error(
      'ไม่สามารถตรวจสอบ backend ก่อนบันทึกคำขอได้\n\n'
      + `API URL: ${getApiUrl()}\n`
      + `รายละเอียด: ${String(error && error.message ? error.message : error)}`
    );
  }

  if (!data || String(data.status || '').toLowerCase() !== 'success') {
    throw new Error(
      'backend ตอบกลับไม่สำเร็จ จึงยังไม่เริ่มบันทึกคำขอ\n\n'
      + buildConnectSheetDiagnosticText(data)
    );
  }

  if (!String(data.backendVersion || '').trim()) {
    throw new Error(
      'Google Apps Script URL นี้ยังเป็น deployment รุ่นเก่าที่ไม่มีระบบตรวจสอบการบันทึกชีต\n\n'
      + buildConnectSheetDiagnosticText(data)
    );
  }

  if (!data.sheetReady) {
    throw new Error(
      'backend ยังไม่พร้อมเข้าถึงชีทสำหรับ CSD1 Connect\n\n'
      + buildConnectSheetDiagnosticText(data)
      + (data.errorMessage ? `\n${String(data.errorMessage)}` : '')
    );
  }

  return data;
}

function waitMs(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function verifyConnectRequestRecorded(requestId, attempts = 3, waitBetweenMs = 450) {
  const cleanRequestId = String(requestId || '').trim();
  if (!cleanRequestId) return false;

  for (let attempt = 0; attempt < attempts; attempt += 1) {
    try {
      const data = await postConnectApi(buildAuthorizedApiPayload('getConnectRequestRawState', {
        requestId: cleanRequestId,
      }));
      if (data && String(data.status || '').toLowerCase() === 'success' && data.rawStateJson) {
        return true;
      }
    } catch (_) {}
    if (attempt < attempts - 1) {
      await waitMs(waitBetweenMs);
    }
  }
  return false;
}

async function finalizeConnectRequestSubmit(pdfBase64) {
  let submitData = null;
  let lastError = null;

  for (let attempt = 0; attempt < 2; attempt += 1) {
    try {
      const result = await submitConnectRequest(pdfBase64 || pendingPdfBase64 || undefined);
      submitData = result && result.data ? result.data : null;
      // เก็บ Drive URL แยกต่างหาก — ห้าม overwrite S.generatedPdfUrl เพราะ
      // blob/SW URL ยังใช้ได้สำหรับ preview และ download โดยตรง
      if (submitData && submitData.pdfUrl) {
        S.generatedPdfDriveUrl = submitData.pdfUrl;
      }
      // ตรวจสอบว่า response มี pdfUrl จริง (ป้องกันลิงก์หลุดจาก Sheet)
      if (submitData && !submitData.pdfUrl && pdfBase64) {
        throw new Error('ระบบบันทึกข้อมูลแล้ว แต่ไม่ได้รับลิงก์ PDF กลับมา อาจเกิดปัญหาการดาวน์โหลดในภายหลัง');
      }
      const verified = await verifyConnectRequestRecorded(S.requestId);
      if (!verified) {
        throw new Error('ไฟล์ถูกบันทึกใน Google Drive แล้ว แต่ระบบยังไม่บันทึกข้อมูลคำขอลง Google Sheet' + buildConnectSheetDiagnosticText(submitData));
      }
      return submitData;
    } catch (error) {
      if (error && error.backendData) {
        error.message = String(error.message || 'บันทึกคำขอ CSD1 Connect ไม่สำเร็จ') + buildConnectSheetDiagnosticText(error.backendData);
      }
      lastError = error;
      if (attempt === 0) {
        await waitMs(500);
      }
    }
  }

  throw lastError || new Error('บันทึกคำขอ CSD1 Connect ไม่สำเร็จ');
}

async function doSubmit() {
  ensureConnectRequestId();
  if (!S.docNumber) {
    showLoadingPopup('กำลังออกเลขหนังสือ...');
    await ensureReservedDocNumber();
    if (!S.docNumber && docNumberReservationState.error) { hideLoadingPopup(); return; }
  }
  if (!S.docNumber) {
    hideLoadingPopup();
    toast('ไม่สามารถออกเลขหนังสือได้','err');
    return;
  }
  if (canUseImmediatePdfBackend()) {
    try {
      showLoadingPopup('กำลังตรวจสอบระบบบันทึกข้อมูล...');
      await ensureConnectBackendReady();

      showLoadingPopup('กำลังสร้างเอกสาร PDF...');
      const result = await renderImmediatePdfViaTemplate();
      await setGeneratedPdfResult(result);

      updateLoadingPopup('กำลังบันทึกคำขอและอัปโหลด PDF...');
      const pdfBase64 = await blobToBase64(result.blob);
      pendingPdfBase64 = pdfBase64;
      await finalizeConnectRequestSubmit(pdfBase64);
      clearPendingPdfBase64();
      // Invalidate connect-status cache
      if (window.CSD1Cache) {
        const u = getStoredAuthUser();
        CSD1Cache.del('connect|' + String(u.email || '').trim().toLowerCase());
      }
      hideLoadingPopup();
      closeDocEditor();
      closeModal();
      S.step=5; render();
      await downloadGeneratedPdf();
      toast('สร้าง PDF สำเร็จ','ok');
      return;
    } catch (error) {
      hideLoadingPopup();
      console.warn('[CSD1 Connect] doSubmit template error:', error);
      if (S.generatedPdfUrl && !isEphemeralUrl(S.generatedPdfUrl)) {
        showSaveRecordWarningModal(error.message || error);
        return;
      }
      if (/backend|deployment|API URL|Spreadsheet|ชีทสำหรับ CSD1 Connect|ตรวจสอบระบบบันทึกข้อมูล/i.test(String(error && error.message ? error.message : error))) {
        showConnectSubmitBlockedModal(error.message || error);
        return;
      }
      toast(`สร้าง PDF หรือบันทึกคำขอไม่สำเร็จ: ${error.message || error}`,'err');
      return;
    }
  }

  hideLoadingPopup();
  toast('ไม่พบระบบสร้าง PDF final ในหน้านี้','err');
}

  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function downloadGeneratedPdf() {
  const fileName = `${getRequestFileBaseName()}.pdf`;
  const localUrl = S.generatedPdfUrl || '';

  // 1) blob URL → download โดยตรงจาก memory (เร็วที่สุด ไม่ต้องผ่าน network)
  if (/^blob:/.test(localUrl)) {
    try {
      const resp = await fetch(localUrl);
      if (resp.ok) {
        const blob = await resp.blob();
        triggerFileDownload(blob, fileName);
        return;
      }
    } catch (_) {}
    // fallback blob URL ถ้า fetch ไม่ได้
    try {
      const link = document.createElement('a');
      link.href = localUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      return;
    } catch (_) {}
  }

  // 2) service worker URL → fetch ผ่าน SW
  if (isGeneratedPdfServiceUrl(localUrl)) {
    try {
      await downloadFileFromUrl(localUrl, fileName);
      return;
    } catch (swError) {
      console.warn('[CSD1 Connect] downloadGeneratedPdf SW fetch failed:', swError);
    }
  }

  // 3) ไม่มี local URL แล้ว → ขอ API backend
  if (S.requestId) {
    try {
      const data = await postConnectApi(buildAuthorizedApiPayload('downloadSummonPdf', {
        requestId: S.requestId,
      }));
      if (data && data.dataBase64) {
        const mimeType = data.mimeType || 'application/pdf';
        const binary = atob(data.dataBase64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        triggerFileDownload(new Blob([bytes], { type: mimeType }), fileName);
        return;
      }
    } catch (apiError) {
      console.warn('[CSD1 Connect] downloadGeneratedPdf API fallback failed:', apiError);
    }
  }

  toast('โหลด PDF ไม่สำเร็จ กรุณาโหลดจากหน้า CSD1 Report', 'err');
}

const GENERATED_PDF_SW_SEGMENT = '/__generated_pdf__/';
let generatedPdfViewerSwPromise = null;

function isGeneratedPdfServiceUrl(url) {
  if (!url) return false;
  try {
    const parsed = new URL(String(url), window.location.href);
    return parsed.origin === window.location.origin && parsed.pathname.includes(GENERATED_PDF_SW_SEGMENT);
  } catch (_) {
    return false;
  }
}

function waitForGeneratedPdfServiceWorkerControl(timeoutMs = 1800) {
  if (!('serviceWorker' in navigator)) return Promise.resolve(null);
  if (navigator.serviceWorker.controller) {
    return Promise.resolve(navigator.serviceWorker.controller);
  }
  return new Promise((resolve) => {
    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      navigator.serviceWorker.removeEventListener('controllerchange', onChange);
      resolve(navigator.serviceWorker.controller || null);
    };
    const onChange = () => finish();
    navigator.serviceWorker.addEventListener('controllerchange', onChange);
    setTimeout(finish, timeoutMs);
  });
}

async function ensureGeneratedPdfViewerServiceWorker() {
  if (!('serviceWorker' in navigator) || window.location.protocol === 'file:') {
    return null;
  }
  if (!generatedPdfViewerSwPromise) {
    generatedPdfViewerSwPromise = (async () => {
      try {
        const swUrl = new URL('./generated-pdf-viewer-sw.js', window.location.href);
        const scopeUrl = new URL('./', window.location.href);
        const registration = await navigator.serviceWorker.register(swUrl.href, { scope: scopeUrl.pathname });
        await navigator.serviceWorker.ready;
        await waitForGeneratedPdfServiceWorkerControl();
        return registration;
      } catch (error) {
        console.warn('[CSD1 Connect] generated PDF service worker unavailable:', error);
        return null;
      }
    })();
  }
  return generatedPdfViewerSwPromise;
}

function postGeneratedPdfServiceWorkerMessage(message, transferables = []) {
  return new Promise((resolve, reject) => {
    if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) {
      reject(new Error('service worker controller unavailable'));
      return;
    }
    const channel = new MessageChannel();
    const timer = setTimeout(() => {
      channel.port1.close();
      reject(new Error('service worker response timeout'));
    }, 4000);
    channel.port1.onmessage = (event) => {
      clearTimeout(timer);
      channel.port1.close();
      const data = event.data || {};
      if (data.ok) {
        resolve(data);
        return;
      }
      reject(new Error(data.error || 'service worker request failed'));
    };
    navigator.serviceWorker.controller.postMessage(message, [channel.port2, ...transferables]);
  });
}

async function createGeneratedPdfViewerUrl(blob, fileName) {
  const registration = await ensureGeneratedPdfViewerServiceWorker();
  if (!registration) {
    return URL.createObjectURL(blob);
  }
  const controller = await waitForGeneratedPdfServiceWorkerControl();
  if (!controller) {
    return URL.createObjectURL(blob);
  }
  const token = `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
  const url = new URL(`./__generated_pdf__/${encodeURIComponent(fileName)}?token=${encodeURIComponent(token)}`, window.location.href).href;
  try {
    const buffer = await blob.arrayBuffer();
    await postGeneratedPdfServiceWorkerMessage({
      type:'STORE_GENERATED_PDF',
      url,
      fileName,
      buffer,
    }, [buffer]);
    return url;
  } catch (error) {
    console.warn('[CSD1 Connect] createGeneratedPdfViewerUrl fallback to blob:', error);
    return URL.createObjectURL(blob);
  }
}

function syncWordTextNode(node, value) {
  if (!node) return;
  const text = String(value == null ? '' : value);
  node.textContent = text;
  if (/^\s|\s$/.test(text)) {
    node.setAttributeNS('http://www.w3.org/XML/1998/namespace', 'xml:space', 'preserve');
  } else {
    node.removeAttributeNS('http://www.w3.org/XML/1998/namespace', 'space');
  }
}

function replaceWordPlaceholdersInXml(xmlText, placeholderMap) {
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
  if (xmlDoc.getElementsByTagName('parsererror').length) {
    throw new Error('ไม่สามารถอ่านโครงสร้าง XML ของ template ได้');
  }

  const textNodes = Array.from(
    xmlDoc.getElementsByTagNameNS('http://schemas.openxmlformats.org/wordprocessingml/2006/main', 't')
  );
  const charMap = [];
  let combined = '';

  textNodes.forEach((node, nodeIndex) => {
    const text = node.textContent || '';
    for (let offset = 0; offset < text.length; offset += 1) {
      charMap.push({ nodeIndex, offset });
      combined += text.charAt(offset);
    }
  });

  const matches = [];
  const re = /\{\{\s*([A-Za-z0-9_]+)\s*\}\}/g;
  let match;
  while ((match = re.exec(combined)) !== null) {
    if (!Object.prototype.hasOwnProperty.call(placeholderMap, match[1])) continue;
    matches.push({
      key: match[1],
      start: match.index,
      end: match.index + match[0].length,
      replacement: String(placeholderMap[match[1]] == null ? '' : placeholderMap[match[1]]),
    });
  }

  matches.reverse().forEach((item) => {
    const startRef = charMap[item.start];
    const endRef = charMap[item.end - 1];
    if (!startRef || !endRef) return;

    const startNode = textNodes[startRef.nodeIndex];
    const endNode = textNodes[endRef.nodeIndex];
    const startText = startNode.textContent || '';
    const endText = endNode.textContent || '';
    const prefix = startText.slice(0, startRef.offset);
    const suffix = endText.slice(endRef.offset + 1);

    if (startRef.nodeIndex === endRef.nodeIndex) {
      syncWordTextNode(startNode, `${prefix}${item.replacement}${suffix}`);
      return;
    }

    syncWordTextNode(startNode, `${prefix}${item.replacement}`);
    for (let i = startRef.nodeIndex + 1; i < endRef.nodeIndex; i += 1) {
      syncWordTextNode(textNodes[i], '');
    }
    syncWordTextNode(endNode, suffix);
  });

  return new XMLSerializer().serializeToString(xmlDoc);
}

function base64ToBlob(base64, mimeType) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mimeType || 'application/octet-stream' });
}

function triggerFileDownload(blob, fileName) {
  const href = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = href;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(href), 1500);
}

async function downloadFileFromUrl(url, fileName) {
  const response = await fetch(url, { cache:'no-store' });
  if (!response.ok) {
    throw new Error(`โหลดไฟล์ไม่สำเร็จ (${response.status})`);
  }
  const blob = await response.blob();
  triggerFileDownload(blob, fileName);
}

async function downloadLegacyBankGeneralDocx() {
  if (!canOfferLegacyBankGeneralDocx()) {
    toast('DOCX template นี้รองรับเฉพาะธนาคารแบบเลขบัญชีเต็ม','err');
    return;
  }
  if (!window.JSZip || typeof window.JSZip.loadAsync !== 'function') {
    toast('ไม่พบ engine สำหรับสร้าง DOCX','err');
    return;
  }

  try {
    const mapper = await loadBankGeneralAliasMapper();
    const resolved = mapper.resolveLegacyBankGeneralTemplate(buildLegacyBankGeneralPayload());
    if (!resolved.report.compatible) {
      toast(`DOCX template ใช้งานไม่ได้: ${resolved.report.blockers.join(', ')}`,'err');
      return;
    }

    const templateUrl = new URL(`./${resolved.template_path}`, window.location.href);
    const response = await fetch(templateUrl.href, { cache:'no-store' });
    if (!response.ok) {
      throw new Error(`โหลด template ไม่สำเร็จ (${response.status})`);
    }

    const zip = await window.JSZip.loadAsync(await response.arrayBuffer());
    const documentFile = zip.file('word/document.xml');
    if (!documentFile) {
      throw new Error('ไม่พบ word/document.xml ใน template');
    }

    const nextXml = replaceWordPlaceholdersInXml(
      await documentFile.async('string'),
      resolved.placeholder_map
    );
    zip.file('word/document.xml', nextXml);

    const outputBlob = await zip.generateAsync({
      type:'blob',
      mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    });
    triggerFileDownload(outputBlob, `${getRequestFileBaseName()}.docx`);

    const warningText = resolved.report.warnings.length ? ` ${resolved.report.warnings[0]}` : '';
    toast(`สร้าง DOCX สำเร็จ.${warningText}`.trim(), 'ok');
  } catch (error) {
    console.warn('[CSD1 Connect] downloadLegacyBankGeneralDocx error:', error);
    toast(`สร้าง DOCX ไม่สำเร็จ: ${error.message || error}`, 'err');
  }
}

function parseDateInput(value) {
  const raw = String(value || '').trim();
  const m = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  const d = new Date(raw);
  return Number.isNaN(d.getTime()) ? null : d;
}

function getThaiDateParts(value) {

  return {
    day: d.getDate(),
    month: TH_MONTHS_FULL[d.getMonth()],
    year: d.getFullYear() + 543,
  };
}

function formatThaiLongDate(value) {
  if (!value) return '...';
  const p = getThaiDateParts(value);
  return `${p.day} ${p.month} ${p.year}`;
}

function isTodayInputDate(value) {
  const d = parseDateInput(value);
  if (!d) return false;
  return fmtDate(d) === fmtDate(new Date());
}

function formatThaiPeriod(start, end, preferPresentWhenToday = false) {
  const startText = start ? `ตั้งแต่วันที่ ${formatThaiLongDate(start)}` : 'ตั้งแต่วันที่ ...';
  if (!end) return startText;
  if (preferPresentWhenToday && isTodayInputDate(end)) return `${startText} ถึงปัจจุบัน`;
  return `${startText} ถึงวันที่ ${formatThaiLongDate(end)}`;
}

function formatThaiDateTime(dateValue, timeValue) {
  const parts = [];
  if (dateValue) parts.push(formatThaiLongDate(dateValue));
  if (timeValue) parts.push(`${timeValue} น.`);
  return parts.join(' ');
}

function normalizeText(value, fallback = '') {
  const text = String(value || '').replace(/\s+/g, ' ').trim();
  return text || fallback;
}

function normalizePrintPosition(value) {

  }
  return text;
}

function formatPoliceRankName(value, { expand = false, strip = false } = {}) {
  const text = normalizeText(value);
  if (!text) return '';

  const rankPatterns = [
    { pattern:'พลเอก', expanded:'พลเอก' },
    { pattern:'พลโท', expanded:'พลโท' },
    { pattern:'พลตรี', expanded:'พลตรี' },
    { pattern:'พันเอก', expanded:'พันเอก' },
    { pattern:'พันโท', expanded:'พันโท' },
    { pattern:'พันตรี', expanded:'พันตรี' },
    { pattern:'ร้อยเอก', expanded:'ร้อยเอก' },
    { pattern:'ร้อยโท', expanded:'ร้อยโท' },
    { pattern:'ร้อยตรี', expanded:'ร้อยตรี' },
    { pattern:'จ่าสิบเอก', expanded:'จ่าสิบเอก' },
    { pattern:'จ่าสิบโท', expanded:'จ่าสิบโท' },
    { pattern:'จ่าสิบตรี', expanded:'จ่าสิบตรี' },
    { pattern:'พลตำรวจเอก', expanded:'พลตำรวจเอก' },
    { pattern:'พลตำรวจโท', expanded:'พลตำรวจโท' },
    { pattern:'พลตำรวจตรี', expanded:'พลตำรวจตรี' },
    { pattern:'พันตำรวจเอก', expanded:'พันตำรวจเอก' },
    { pattern:'พันตำรวจโท', expanded:'พันตำรวจโท' },
    { pattern:'พันตำรวจตรี', expanded:'พันตำรวจตรี' },
    { pattern:'ร้อยตำรวจเอก', expanded:'ร้อยตำรวจเอก' },
    { pattern:'ร้อยตำรวจโท', expanded:'ร้อยตำรวจโท' },
    { pattern:'ร้อยตำรวจตรี', expanded:'ร้อยตำรวจตรี' },
    { pattern:'สิบตำรวจเอก', expanded:'สิบตำรวจเอก' },
    { pattern:'สิบตำรวจโท', expanded:'สิบตำรวจโท' },
    { pattern:'สิบตำรวจตรี', expanded:'สิบตำรวจตรี' },
    { pattern:'ดาบตำรวจ', expanded:'ดาบตำรวจ' },
    { pattern:'พ\\.ต\\.อ\\.', expanded:'พันตำรวจเอก' },
    { pattern:'พ\\.ต\\.ท\\.', expanded:'พันตำรวจโท' },
    { pattern:'พ\\.ต\\.ต\\.', expanded:'พันตำรวจตรี' },
    { pattern:'ร\\.ต\\.อ\\.', expanded:'ร้อยตำรวจเอก' },
    { pattern:'ร\\.ต\\.ท\\.', expanded:'ร้อยตำรวจโท' },
    { pattern:'ร\\.ต\\.ต\\.', expanded:'ร้อยตำรวจตรี' },
    { pattern:'ส\\.ต\\.อ\\.', expanded:'สิบตำรวจเอก' },
    { pattern:'ส\\.ต\\.ท\\.', expanded:'สิบตำรวจโท' },
    { pattern:'ส\\.ต\\.ต\\.', expanded:'สิบตำรวจตรี' },
    { pattern:'ด\\.ต\\.', expanded:'ดาบตำรวจ' },
    { pattern:'พล\\.อ\\.', expanded:'พลเอก' },
    { pattern:'พล\\.ท\\.', expanded:'พลโท' },
    { pattern:'พล\\.ต\\.', expanded:'พลตรี' },
    { pattern:'พ\\.อ\\.', expanded:'พันเอก' },
    { pattern:'พ\\.ท\\.', expanded:'พันโท' },
    { pattern:'พ\\.ต\\.', expanded:'พันตรี' },
    { pattern:'ร\\.อ\\.', expanded:'ร้อยเอก' },
    { pattern:'ร\\.ท\\.', expanded:'ร้อยโท' },
    { pattern:'ร\\.ต\\.', expanded:'ร้อยตรี' },
    { pattern:'จ\\.ส\\.อ\\.', expanded:'จ่าสิบเอก' },
    { pattern:'จ\\.ส\\.ท\\.', expanded:'จ่าสิบโท' },
    { pattern:'จ\\.ส\\.ต\\.', expanded:'จ่าสิบตรี' },
  ];

  for (const rankInfo of rankPatterns) {
    const regex = new RegExp(`^(ว่าที่\\s*)?(${rankInfo.pattern})(?:\\s*(หญิง|พิเศษ))?\\s*(.*)$`, 'u');
    const match = text.match(regex);
    if (!match) continue;

    const prefix = match[1] ? 'ว่าที่ ' : '';
    let modifier = match[3] || '';
    let rest = (match[4] || '').trim();

    if (!modifier) {
      const modifierMatch = rest.match(/^(หญิง|พิเศษ)\s+(.*)$/u);
      if (modifierMatch) {
        modifier = modifierMatch[1];
        rest = (modifierMatch[2] || '').trim();
      }
    }

    if (strip) {
      return rest || text;
    }

    const rankText = expand ? rankInfo.expanded : match[2];
    return `${prefix}${rankText}${modifier}${rest ? ` ${rest}` : ''}`.trim();
  }

  return text;
}

function waitForNextPaint() {
  return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
}

async function waitForPrintAssets(root) {
  const tasks = [waitForNextPaint()];
  if (document.fonts && document.fonts.ready) {
    tasks.push(document.fonts.ready.catch(() => {}));
  }
  root.querySelectorAll('img').forEach(img => {
    if (img.complete) return;
    tasks.push(new Promise(resolve => {
      const done = () => resolve();
      img.addEventListener('load', done, { once:true });
      img.addEventListener('error', done, { once:true });
      setTimeout(done, 1200);
    }));
  });
  await Promise.all(tasks);
  await waitForNextPaint();
}

function lockPhraseTextNodes(element) {
  if (!element || element.querySelector('.official-print-phrase')) return;
  const walker = document.createTreeWalker(
    element,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode(node) {
        return node.nodeValue && node.nodeValue.trim()
          ? NodeFilter.FILTER_ACCEPT
          : NodeFilter.FILTER_REJECT;
      },
    }
  );
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach((node) => {
    const fragment = document.createDocumentFragment();
    node.nodeValue.split(/(\s+)/).forEach((part) => {
      if (!part) return;
      if (/^\s+$/.test(part)) {
        fragment.appendChild(document.createTextNode(' '));
        return;
      }
      const span = document.createElement('span');
      span.className = 'official-print-phrase';
      span.textContent = part;
      fragment.appendChild(span);
    });
    node.parentNode.replaceChild(fragment, node);
  });
}

function applyPrintPhraseLayout(root) {

function fitPrintDocument(root) {
  const page = root.querySelector('.official-print-page');
  const inner = root.querySelector('.official-print-page-inner');
  if (!page || !inner) return 1;
  let scale = 1;
  inner.style.setProperty('--print-scale', '1');

  const getOverflow = () => {
    const pageRect = page.getBoundingClientRect();
    const blocks = Array.from(inner.children);
    const contentBottom = blocks.reduce(
      (max, el) => Math.max(max, el.getBoundingClientRect().bottom),
      inner.getBoundingClientRect().top
    );
    const contentRight = blocks.reduce(
      (max, el) => Math.max(max, el.getBoundingClientRect().right),
      inner.getBoundingClientRect().left
    );
    return {
      bottom: contentBottom - (pageRect.bottom - 3),
      right: contentRight - (pageRect.right - 2),
    };
  };

  let overflow = getOverflow();
  for (let i = 0; i < 16 && (overflow.bottom > 0 || overflow.right > 0) && scale > 0.74; i += 1) {
    scale = Math.max(0.74, scale - 0.03);
    inner.style.setProperty('--print-scale', scale.toFixed(2));
    overflow = getOverflow();
  }
  return scale;
}

function getPrintDocumentHtml() {
  if (S.type === 'bank') return renderBankPrintDocument();
  if (S.type === 'truemoney') return renderTrueMoneyPrintDocument();
  if (S.type === 'tax') return renderTaxPrintDocument();
  if (S.type === 'phone') {
    if ((S.phoneNetwork === 'TRUE' || S.phoneNetwork === 'DTAC') && S.phoneSubType === 'IMEI') return renderImeiPrintDocument();
    if (S.phoneNetwork === 'AIS' && S.aisSubType === 'BASE') return renderBasePrintDocument();
    if (S.phoneNetwork === 'AIS' && S.aisSubType === 'IP') return renderIpPrintDocument();
    return renderPhonePrintDocument();
  }
  return renderOfficialDocument({

function disposeGeneratedPdfUrl(url) {
  if (!url) return;
  if (/^blob:/.test(String(url))) {
    try { URL.revokeObjectURL(url); } catch (_) {}
    return;
  }
  if (isGeneratedPdfServiceUrl(url)) {
    postGeneratedPdfServiceWorkerMessage({ type:'REMOVE_GENERATED_PDF', url }).catch(() => {});
  }
}

function resetGeneratedPdfState() {
  disposeGeneratedPdfUrl(S.generatedPdfUrl);
  S.generatedPdfUrl = '';
  S.generatedDocxUrl = '';
  S.generatedWarnings = [];
  S.generatedMode = '';
  S.generatedPdfDriveUrl = '';
}

async function setGeneratedPdfResult(result) {
  resetGeneratedPdfState();
  S.generatedPdfUrl = await createGeneratedPdfViewerUrl(result.blob, `${getRequestFileBaseName()}.pdf`);
  S.generatedWarnings = Array.isArray(result.warnings) ? result.warnings : [];
  S.generatedMode = 'pdf-template';
  return S.generatedPdfUrl;
}

// PDF base64 ที่เก็บไว้สำหรับ retry กรณีบันทึก Sheet ไม่สำเร็จครั้งแรก
let pendingPdfBase64 = null;
function clearPendingPdfBase64() { pendingPdfBase64 = null; }

async function blobToBase64(blob) {
  const buffer = await blob.arrayBuffer();
  const bytes  = new Uint8Array(buffer);
  let binary = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

async function uploadPdfToDrive(blob, fileName) {
  try {
    const base64 = await blobToBase64(blob);
    const data = await postConnectApi(buildAuthorizedApiPayload('uploadSummonPdf', {
      requestId:   S.requestId,
      pdfFileName: fileName,
      pdfBase64:   base64,
    }));
    if (String(data.status || '').toLowerCase() === 'success' && data.pdfUrl) {
      return data.pdfUrl;
    }
    return null;
  } catch (e) {
    console.warn('[CSD1 Connect] uploadPdfToDrive failed:', e);
    return null;
  }
}

let _toastTimer;
function toast(msg, type='info') {
  const t=document.getElementById('toast');
  if (!t) return;
  const text = String(msg == null ? '' : msg).trim();
  if (!text) {
    t.textContent='';
    t.className='toast';
    clearTimeout(_toastTimer);
    return;
  }
  t.textContent=text;
  t.className='toast show'+(type==='err'?' toast-error':type==='ok'?' toast-success':'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

function toggleTheme() {
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('CSD1_THEME',next);}catch(_){}
  updateThemeIcon();
}

function updateThemeIcon() {
  const ic=document.getElementById('themeIcon');
  if(ic) ic.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';
}

window.addEventListener('resize', () => {
  if (document.getElementById('docEditorWrap')) syncDocEditorScale();
});

/* ===== START ===== */
init();
</script>
<script>
// ==================== PWA LINK INTERCEPTOR ====================
(function() {
  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.matchMedia('(display-mode: fullscreen)').matches ||
    window.navigator.standalone === true;
  if (!isStandalone) return;
  document.addEventListener('click', function(e) {
    if (e.defaultPrevented) return;
    const a = e.target.closest('a[href]');
    if (!a) return;
    let url;
    try { url = new URL(a.href, location.href); } catch(_) { return; }
    if (url.origin === location.origin && !a.getAttribute('target')) {
      e.preventDefault();
      location.href = url.pathname + url.search + url.hash;
    }
  });
})();
</script>
